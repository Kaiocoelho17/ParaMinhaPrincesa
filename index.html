<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Valentine</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hearts"></div>

<div class="container">

  <img src="carta.png" id="envelope">

  <div id="letter">
    <div class="box">

      <!-- BARRA -->
      <div class="window-bar">
        <div class="window-tab">love ✕</div>
        <div class="window-controls">
          <span>-</span>
          <span>□</span>
          <span>X</span>
        </div>
      </div>

      <div class="content">
        <h1>Vai ser meu amorzinho?💖</h1>

        <img src="gatin.png" class="cat">

        <div class="btns">
          <button id="yes">SIM</button>
          <button id="no">NÃO</button>
        </div>

        <p id="msg">💖 Eu sabia 😏💖</p>
      </div>

    </div>
  </div>

  <!-- CARTA 2 -->
  <div id="letter2" style="display:none;">
    <div class="box">

      <!-- BARRA -->
      <div class="window-bar">
        <div class="window-tab">love ✕</div>
        <div class="window-controls">
          <span>-</span>
          <span>□</span>
          <span>X</span>
        </div>
      </div>

      <div class="content">
        <h1>HUHUUUUUUL</h1>

        <img src="gato2.gif" class="cat">

        <p>Level UP: 
        </p>Amor desbloqueado 💖</p>
      </div>

    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
